{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body">

                <h3 class="text-center mb-4">
                    註冊帳號
                </h3>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            帳號
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            密碼
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            身分
                        </label>

                        <select name="role"
                                class="form-select">

                            <option value="user">
                                用戶端
                            </option>

                            <option value="seller">
                                商家端
                            </option>

                        </select>

                    </div>

                    <button class="btn btn-primary w-100">
                        註冊
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
