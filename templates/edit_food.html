{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-body">

                <h3 class="mb-4">
                    編輯剩食
                </h3>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            食品名稱
                        </label>

                        <input type="text"
                               name="name"
                               value="{{ food.name }}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            食品描述
                        </label>

                        <textarea
                            name="description"
                            rows="4"
                            class="form-control">{{ food.description }}</textarea>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            數量
                        </label>

                        <input type="number"
                               name="quantity"
                               value="{{ food.quantity }}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            領取時間
                        </label>

                        <input type="text"
                               name="pickup_time"
                               value="{{ food.pickup_time }}"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-primary">
                        更新資料
                    </button>
                    <button class="btn btn-secondary"
                            type="button"
                            onclick="window.location.href='/seller/dashboard'">
                        返回列表
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
